<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC Barcode Scanner (Mobile)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ตกแต่งกล้องให้เต็มจอหรือสวยงามบนมือถือ */
        #reader { width: 100%; border: none !important; border-radius: 0.75rem; overflow: hidden; background: #000; }
        #reader video { object-fit: cover; }
        #reader__dashboard_section_csr span { display: none !important; } 
        
        /* Effect สำหรับกล่องเป้าเล็งและเลเซอร์ */
        @keyframes scan-laser {
            0%, 100% { top: 0%; opacity: 0; }
            10%, 90% { opacity: 1; }
            50% { top: 100%; opacity: 1; }
        }
        .animate-scan-laser {
            animation: scan-laser 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .aim-corner { transition: border-color 0.2s ease; }
        
        /* Toast Notification */
        .toast { transition: opacity 0.3s, transform 0.3s; }
        .toast.hidden-toast { opacity: 0; transform: translateY(-20px) translateX(-50%); pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <div class="bg-blue-700 text-white p-4 shadow-md z-10 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-barcode mr-2"></i> QC Scanner</h1>
        <span class="bg-blue-800 text-xs px-2 py-1 rounded-full font-mono shadow-inner" id="total-count-badge">0 รายการ</span>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 overflow-auto flex flex-col p-4 gap-4 pb-24 relative">
        
        <!-- ส่วนของกล้องและเป้าเล็ง (Viewfinder) -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 shrink-0 relative">
            
            <div id="scanner-wrapper" class="relative rounded-lg overflow-hidden bg-black mb-3 aspect-[4/3] md:aspect-video flex items-center justify-center">
                <!-- กล่องวิดีโอกล้อง -->
                <div id="reader" class="w-full h-full absolute inset-0"></div>
                
                <!-- ไอคอนตอนยังไม่เปิดกล้อง -->
                <i id="idle-icon" class="fa-solid fa-camera text-5xl text-gray-600 z-0"></i>

                <!-- Loading ตอนเปิดกล้อง -->
                <div id="cam-loading" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/70 z-10 backdrop-blur-sm">
                     <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-3"></i>
                     <span class="text-white font-medium text-sm">กำลังเปิดกล้อง...</span>
                </div>

                <!-- เป้าเล็ง (Aiming Overlay) -->
                <div id="scanner-aim" class="hidden absolute inset-0 pointer-events-none flex items-center justify-center z-20">
                    <!-- ขนาดความกว้าง 90% และสูง 120px (ตั้งให้พอดีกับ qrbox) -->
                    <div class="relative w-[90%] h-[120px]">
                        <!-- มุมเล็ง 4 ด้าน -->
                        <div class="aim-corner absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-blue-500 rounded-tl-lg"></div>
                        <div class="aim-corner absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-blue-500 rounded-tr-lg"></div>
                        <div class="aim-corner absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-blue-500 rounded-bl-lg"></div>
                        <div class="aim-corner absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-blue-500 rounded-br-lg"></div>
                        
                        <!-- เส้นเลเซอร์ -->
                        <div id="aim-laser" class="absolute top-0 left-0 w-full h-[2px] bg-red-500 shadow-[0_0_10px_rgba(239,68,68,1)] animate-scan-laser"></div>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2 relative z-30">
                <button id="btn-start-scan" class="flex-1 bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition flex items-center justify-center">
                    <i class="fa-solid fa-play mr-2"></i> เปิดกล้อง
                </button>
                <button id="btn-stop-scan" class="hidden flex-1 bg-gray-800 active:bg-gray-900 text-white font-bold py-3 px-4 rounded-lg shadow transition flex items-center justify-center">
                    <i class="fa-solid fa-stop mr-2"></i> พักกล้อง
                </button>
            </div>

            <!-- กล่องกรอกข้อมูลด้วยมือ -->
            <div class="mt-3 flex gap-2">
                <input type="text" id="manual-barcode" placeholder="กรอกเลขบาร์โค้ดเผื่อแสกนไม่ติด..." class="flex-1 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                <button onclick="handleManualInput()" class="bg-gray-800 text-white px-4 rounded-lg active:bg-gray-700 font-bold transition">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </div>

        <!-- รายการที่สแกนแล้ว -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 min-h-[250px]">
            <div class="p-3 border-b flex justify-between items-center bg-gray-50 rounded-t-xl shrink-0">
                <h3 class="font-bold text-gray-700"><i class="fa-solid fa-list-check mr-2 text-blue-500"></i> รายการล่าสุด</h3>
                <button onclick="clearAllData()" class="text-xs text-red-500 font-medium px-3 py-1.5 bg-red-50 hover:bg-red-100 rounded border border-red-200 transition">
                    ล้างทั้งหมด
                </button>
            </div>
            
            <!-- List Container -->
            <div class="flex-1 overflow-y-auto p-2" id="scanned-list-container">
                <ul id="scanned-list" class="space-y-2 flex flex-col-reverse">
                    <!-- ข้อมูลจะถูกแทรกที่นี่ผ่าน JS -->
                </ul>
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-gray-400 py-8">
                    <i class="fa-solid fa-box-open text-4xl mb-3 text-gray-300"></i>
                    <p class="text-sm font-medium">ยังไม่มีข้อมูลการสแกน</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Action Bar (Fixed) -->
    <div class="bg-white border-t border-gray-200 p-3 flex gap-3 fixed bottom-0 w-full shadow-[0_-5px_15px_-10px_rgba(0,0,0,0.05)] z-20">
        <button onclick="copyToClipboard()" class="flex-1 bg-gray-100 border border-gray-300 text-gray-700 active:bg-gray-200 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition">
            <i class="fa-regular fa-copy"></i> คัดลอก
        </button>
        <button onclick="exportToCSV()" class="flex-1 bg-green-50 border border-green-300 text-green-700 active:bg-green-100 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition">
            <i class="fa-solid fa-file-csv"></i> โหลด CSV
        </button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden-toast fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full font-bold shadow-lg flex items-center gap-2">
        <i id="toast-icon" class="fa-solid fa-check"></i>
        <span id="toast-text">แจ้งเตือน</span>
    </div>

    <!-- Audio สำหรับเสียง Beep -->
    <audio id="beep-success" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <audio id="beep-error" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>

    <script>
        // --- State Management ---
        let scannedData = [];
        let html5QrCode = null;
        let isScannerRunning = false;
        let isProcessing = false; 

        // DOM Elements
        const listUl = document.getElementById('scanned-list');
        const emptyState = document.getElementById('empty-state');
        const totalBadge = document.getElementById('total-count-badge');
        const manualInput = document.getElementById('manual-barcode');
        
        // Aiming Elements
        const aimOverlay = document.getElementById('scanner-aim');
        const camLoading = document.getElementById('cam-loading');
        const idleIcon = document.getElementById('idle-icon');
        const aimCorners = document.querySelectorAll('.aim-corner');
        const aimLaser = document.getElementById('aim-laser');

        // Sounds
        const soundSuccess = document.getElementById('beep-success');
        const soundError = document.getElementById('beep-error');

        // --- เริ่มต้นโหลดข้อมูล ---
        window.onload = () => {
            loadFromLocalStorage();
        };

        // --- Scanner Logic ---
        document.getElementById('btn-start-scan').addEventListener('click', startScanner);
        document.getElementById('btn-stop-scan').addEventListener('click', stopScanner);

        function startScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            document.getElementById('btn-start-scan').classList.add('hidden');
            document.getElementById('btn-stop-scan').classList.remove('hidden');
            
            idleIcon.classList.add('hidden');
            camLoading.classList.remove('hidden');

            // แก้ไข: เอาข้อจำกัด qrbox ออกเพื่อให้แสกนได้เต็มจอ (Full Frame) 
            // ช่วยแก้ปัญหากล้องไม่อ่านบาร์โค้ด และเพิ่มความเร็วในการสแกนขึ้น (ปรับ fps เป็น 15)
            const config = { 
                fps: 15
            };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .then(() => { 
                    isScannerRunning = true; 
                    camLoading.classList.add('hidden');
                    aimOverlay.classList.remove('hidden'); // แสดงเป้าเล็งและเลเซอร์
                })
                .catch(err => {
                    showToast('ไม่สามารถเปิดกล้องได้', 'error');
                    console.error(err);
                    stopScanner();
                });
        }

        function stopScanner() {
            if (html5QrCode && isScannerRunning) {
                html5QrCode.stop().then(() => {
                    isScannerRunning = false;
                    document.getElementById('btn-start-scan').classList.remove('hidden');
                    document.getElementById('btn-stop-scan').classList.add('hidden');
                    
                    aimOverlay.classList.add('hidden'); // ซ่อนเป้าเล็ง
                    camLoading.classList.add('hidden');
                    idleIcon.classList.remove('hidden'); // กลับมาแสดงไอคอนกล้องพัก
                });
            }
        }

        function onScanSuccess(decodedText) {
            if (isProcessing) return; // ติดสถานะล็อคอยู่ ให้ข้ามไปเลย (กันค้าง)

            isProcessing = true; 
            
            try {
                const barcode = decodedText.trim();
                
                // ตรวจสอบข้อมูล
                const isDuplicate = scannedData.some(item => item.barcode === barcode);

                if (isDuplicate) {
                    // เอฟเฟกต์แสกนติดแต่ซ้ำ (สีแดง)
                    triggerSnapEffect('error');
                    playSound('error');
                    showToast(`ซ้ำ! ${barcode}`, 'error');
                } else {
                    // เอฟเฟกต์แสกนติด (สีเขียว)
                    triggerSnapEffect('success');
                    playSound('success');
                    showToast(`${barcode}`, 'success');
                    
                    // บันทึกข้อมูล
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('th-TH');
                    scannedData.push({ barcode: barcode, time: timeStr, timestamp: now.getTime() });
                    
                    saveToLocalStorage();
                    renderList();
                }
            } catch (error) {
                console.error("เกิดข้อผิดพลาดตอนประมวลผลบาร์โค้ด:", error);
            } finally {
                // ล็อคเป้าไว้ 1.5 วินาที ก่อนปลดล็อคให้กล้องแสกนอันต่อไปได้ 
                // (ใส่ finally ไว้เพื่อให้มั่นใจว่าระบบจะปลดล็อคเสมอแม้เกิด Error)
                setTimeout(() => {
                    isProcessing = false;
                }, 1500);
            }
        }
        
        // --- เอฟเฟกต์กระพริบตอนแสกนติด (Snap Effect) ---
        function triggerSnapEffect(type) {
            // ซ่อนเลเซอร์
            aimLaser.classList.add('hidden');
            
            // เปลี่ยนสีมุม
            aimCorners.forEach(c => {
                c.classList.remove('border-blue-500');
                if (type === 'success') {
                    c.classList.add('border-green-500');
                } else {
                    c.classList.add('border-red-500');
                }
            });
            
            // คืนค่ากลับเป็นสถานะ "กำลังเล็ง (เลเซอร์แดง, มุมฟ้า)" หลัง 1.5 วิ
            setTimeout(() => {
                aimCorners.forEach(c => {
                    c.classList.remove('border-green-500', 'border-red-500');
                    c.classList.add('border-blue-500');
                });
                aimLaser.classList.remove('hidden');
            }, 1500);
        }

        function handleManualInput() {
            const barcode = manualInput.value.trim();
            if (barcode) {
                if (scannedData.some(item => item.barcode === barcode)) {
                    playSound('error');
                    showToast(`ซ้ำ! ${barcode}`, 'error');
                } else {
                    const now = new Date();
                    scannedData.push({ barcode: barcode, time: now.toLocaleTimeString('th-TH'), timestamp: now.getTime() });
                    saveToLocalStorage();
                    renderList();
                    playSound('success');
                    showToast(`เพิ่มแล้ว`, 'success');
                }
                manualInput.value = '';
            }
        }

        // จับกด Enter ในช่องพิมพ์
        manualInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleManualInput();
        });

        function deleteItem(timestamp) {
            if (confirm('ต้องการลบรายการนี้ใช่หรือไม่?')) {
                scannedData = scannedData.filter(item => item.timestamp !== timestamp);
                saveToLocalStorage();
                renderList();
            }
        }

        function clearAllData() {
            if (scannedData.length === 0) return;
            if (confirm('คุณต้องการ "ล้างข้อมูลการสแกนทั้งหมด" ใช่หรือไม่?\n(ไม่สามารถกู้คืนได้)')) {
                scannedData = [];
                saveToLocalStorage();
                renderList();
                showToast('ล้างข้อมูลเรียบร้อย', 'info');
            }
        }

        // --- Data & UI Update ---
        function renderList() {
            listUl.innerHTML = '';
            totalBadge.innerText = `${scannedData.length} รายการ`;

            if (scannedData.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            scannedData.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-white border border-gray-100 p-3 rounded-lg shadow-sm mb-2";
                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-800 text-lg tracking-wide">${item.barcode}</span>
                        <span class="text-xs text-gray-400"><i class="fa-regular fa-clock"></i> ${item.time}</span>
                    </div>
                    <button onclick="deleteItem(${item.timestamp})" class="text-gray-400 hover:text-red-500 bg-gray-50 p-2 rounded-full active:bg-red-100 transition">
                        <i class="fa-solid fa-xmark px-1"></i>
                    </button>
                `;
                // ใช้ prepend เพื่อให้รายการใหม่สุดดันขึ้นไปอยู่บนสุด
                listUl.prepend(li);
            });
        }

        function saveToLocalStorage() {
            localStorage.setItem('mobile_qc_scans', JSON.stringify(scannedData));
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('mobile_qc_scans');
                if (saved) {
                    scannedData = JSON.parse(saved);
                    renderList();
                }
            } catch (e) {
                console.error("Load error:", e);
            }
        }

        // --- Export Functions ---
        function copyToClipboard() {
            if (scannedData.length === 0) {
                showToast('ไม่มีข้อมูลให้คัดลอก', 'error');
                return;
            }

            let textToCopy = "บาร์โค้ด\tเวลา\n";
            // เรียงจากเก่าไปใหม่สำหรับ Export
            scannedData.forEach(item => {
                textToCopy += `${item.barcode}\t${item.time}\n`;
            });

            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast('คัดลอกสำเร็จ!', 'success');
        }

        function exportToCSV() {
            if (scannedData.length === 0) {
                showToast('ไม่มีข้อมูลให้ Export', 'error');
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFFบาร์โค้ด,เวลา\n";
            scannedData.forEach(item => {
                csvContent += `"${item.barcode}","${item.time}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            const dateStr = new Date().toISOString().split('T')[0];
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `QC_Scan_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('ดาวน์โหลด CSV สำเร็จ!', 'success');
        }

        // --- Utils ---
        function playSound(type) {
            try {
                if (type === 'success') {
                    soundSuccess.currentTime = 0;
                    soundSuccess.play().catch(e=>console.log(e));
                } else {
                    soundError.currentTime = 0;
                    soundError.play().catch(e=>console.log(e));
                }
            } catch (error) {}
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastText = document.getElementById('toast-text');

            toastText.innerText = message;
            
            if (type === 'success') {
                toast.className = "toast fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full font-bold shadow-lg flex items-center gap-2 bg-green-500 text-white";
                toastIcon.className = "fa-solid fa-circle-check";
            } else if (type === 'error') {
                toast.className = "toast fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full font-bold shadow-lg flex items-center gap-2 bg-red-500 text-white";
                toastIcon.className = "fa-solid fa-circle-xmark";
            } else {
                toast.className = "toast fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full font-bold shadow-lg flex items-center gap-2 bg-gray-800 text-white";
                toastIcon.className = "fa-solid fa-circle-info";
            }

            toast.classList.remove('hidden-toast');

            // ซ่อนอัตโนมัติ
            setTimeout(() => {
                toast.classList.add('hidden-toast');
            }, 2000);
        }
    </script>
</body>
</html>
