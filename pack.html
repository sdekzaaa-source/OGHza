<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC Barcode Scanner (Mobile)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* ตกแต่งกล้องให้เต็มจอหรือสวยงามบนมือถือ */
        #reader { width: 100%; border: none !important; border-radius: 0.75rem; overflow: hidden; background: #000; }
        #reader video { object-fit: cover; }
        #reader__dashboard_section_csr span { display: none !important; } 
        
        /* Toast Notification */
        .toast { transition: opacity 0.3s, transform 0.3s; }
        .toast.hidden-toast { opacity: 0; transform: translateY(-20px) translateX(-50%); pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <div class="bg-blue-700 text-white p-4 shadow-md z-10 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-barcode mr-2"></i> QC Scanner</h1>
        <span class="bg-blue-800 text-xs px-2 py-1 rounded-full font-mono" id="total-count-badge">0 รายการ</span>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 overflow-auto flex flex-col p-4 gap-4 pb-24 relative">
        
        <!-- ส่วนของกล้องและปุ่มควบคุม -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 shrink-0">
            <div id="reader" class="aspect-[4/3] md:aspect-video mb-3 relative flex items-center justify-center">
                <i class="fa-solid fa-camera text-4xl text-gray-600"></i>
            </div>
            
            <div class="flex gap-2">
                <button id="btn-start-scan" class="flex-1 bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition">
                    <i class="fa-solid fa-play mr-1"></i> เปิดกล้อง
                </button>
                <button id="btn-stop-scan" class="hidden flex-1 bg-red-500 active:bg-red-600 text-white font-bold py-3 px-4 rounded-lg shadow transition">
                    <i class="fa-solid fa-stop mr-1"></i> ปิดกล้อง
                </button>
            </div>

            <!-- กล่องกรอกข้อมูลด้วยมือ -->
            <div class="mt-3 flex gap-2">
                <input type="text" id="manual-barcode" placeholder="กรอกเลขบาร์โค้ด..." class="flex-1 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                <button onclick="handleManualInput()" class="bg-gray-800 text-white px-4 rounded-lg active:bg-gray-700 font-bold">
                    <i class="fa-solid fa-plus"></i> เพิ่ม
                </button>
            </div>
        </div>

        <!-- รายการที่สแกนแล้ว -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 min-h-[250px]">
            <div class="p-3 border-b flex justify-between items-center bg-gray-50 rounded-t-xl shrink-0">
                <h3 class="font-bold text-gray-700"><i class="fa-solid fa-list-check mr-1"></i> รายการสแกนล่าสุด</h3>
                <button onclick="clearAllData()" class="text-xs text-red-500 font-medium px-2 py-1 bg-red-50 rounded border border-red-200">
                    ล้างทั้งหมด
                </button>
            </div>
            
            <!-- List Container -->
            <div class="flex-1 overflow-y-auto p-2" id="scanned-list-container">
                <ul id="scanned-list" class="space-y-2 flex flex-col-reverse">
                    <!-- ข้อมูลจะถูกแทรกที่นี่ผ่าน JS (รายการใหม่สุดอยู่บน) -->
                </ul>
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-gray-400 py-8">
                    <i class="fa-solid fa-box-open text-4xl mb-2 text-gray-300"></i>
                    <p class="text-sm">ยังไม่มีข้อมูลการสแกน</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Action Bar (Fixed) -->
    <div class="bg-white border-t border-gray-200 p-3 flex gap-3 fixed bottom-0 w-full shadow-[0_-5px_15px_-10px_rgba(0,0,0,0.1)] z-20">
        <button onclick="copyToClipboard()" class="flex-1 bg-gray-100 border border-gray-300 text-gray-700 active:bg-gray-200 font-bold py-3 rounded-xl flex items-center justify-center gap-2">
            <i class="fa-regular fa-copy"></i> Copy
        </button>
        <button onclick="exportToCSV()" class="flex-1 bg-green-50 border border-green-300 text-green-700 active:bg-green-100 font-bold py-3 rounded-xl flex items-center justify-center gap-2">
            <i class="fa-solid fa-file-csv"></i> Export CSV
        </button>
    </div>

    <!-- Toast Notification (ตรงกลางด้านบน) -->
    <div id="toast" class="toast hidden-toast fixed top-16 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full font-bold shadow-lg flex items-center gap-2">
        <i id="toast-icon" class="fa-solid fa-check"></i>
        <span id="toast-text">แจ้งเตือน</span>
    </div>

    <!-- Audio สำหรับเสียง Beep -->
    <audio id="beep-success" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <audio id="beep-error" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>

    <script>
        // --- State Management ---
        let scannedData = [];
        let html5QrCode = null;
        let isScannerRunning = false;
        let lastScannedCode = "";
        let lastScanTime = 0;

        // DOM Elements
        const listUl = document.getElementById('scanned-list');
        const emptyState = document.getElementById('empty-state');
        const totalBadge = document.getElementById('total-count-badge');
        const manualInput = document.getElementById('manual-barcode');

        // Sounds
        const soundSuccess = document.getElementById('beep-success');
        const soundError = document.getElementById('beep-error');

        // --- เริ่มต้นโหลดข้อมูล ---
        window.onload = () => {
            loadFromLocalStorage();
        };

        // --- Scanner Logic ---
        document.getElementById('btn-start-scan').addEventListener('click', startScanner);
        document.getElementById('btn-stop-scan').addEventListener('click', stopScanner);

        function startScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            document.getElementById('btn-start-scan').classList.add('hidden');
            document.getElementById('btn-stop-scan').classList.remove('hidden');

            const config = { fps: 10, qrbox: { width: 250, height: 100 } };
            // ใช้กล้องหลังมือถือ (environment)
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .then(() => { isScannerRunning = true; })
                .catch(err => {
                    showToast('ไม่สามารถเปิดกล้องได้', 'error');
                    console.error(err);
                    stopScanner();
                });
        }

        function stopScanner() {
            if (html5QrCode && isScannerRunning) {
                html5QrCode.stop().then(() => {
                    isScannerRunning = false;
                    document.getElementById('btn-start-scan').classList.remove('hidden');
                    document.getElementById('btn-stop-scan').classList.add('hidden');
                });
            }
        }

        function onScanSuccess(decodedText) {
            const now = Date.now();
            const barcode = decodedText.trim();
            
            // ป้องกันการแสกนเบิ้ลซ้ำในเวลาไล่เลี่ยกัน (2 วินาที)
            if (barcode === lastScannedCode && (now - lastScanTime) < 2000) {
                return; 
            }
            
            lastScannedCode = barcode;
            lastScanTime = now;
            
            processBarcode(barcode);
        }

        function handleManualInput() {
            const barcode = manualInput.value.trim();
            if (barcode) {
                processBarcode(barcode);
                manualInput.value = '';
            }
        }

        // จับกด Enter ในช่องพิมพ์
        manualInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleManualInput();
        });

        function processBarcode(barcode) {
            // ตรวจสอบว่าแสกนซ้ำหรือไม่ (เคยมีอยู่ในรายการของวันนี้แล้วหรือยัง)
            const isDuplicate = scannedData.some(item => item.barcode === barcode);

            if (isDuplicate) {
                playSound('error');
                showToast(`ซ้ำ! ${barcode} ถูกแสกนไปแล้ว`, 'error');
                return;
            }

            // เพิ่มเข้า List
            const now = new Date();
            const timeStr = now.toLocaleTimeString('th-TH');
            const newItem = { barcode: barcode, time: timeStr, timestamp: now.getTime() };
            
            scannedData.push(newItem);
            saveToLocalStorage();
            renderList();
            
            playSound('success');
            showToast(`เพิ่ม: ${barcode}`, 'success');
        }

        function deleteItem(timestamp) {
            if (confirm('ต้องการลบรายการนี้ใช่หรือไม่?')) {
                scannedData = scannedData.filter(item => item.timestamp !== timestamp);
                saveToLocalStorage();
                renderList();
            }
        }

        function clearAllData() {
            if (scannedData.length === 0) return;
            if (confirm('คุณต้องการ "ล้างข้อมูลการสแกนทั้งหมด" ใช่หรือไม่? (ไม่สามารถกู้คืนได้)')) {
                scannedData = [];
                saveToLocalStorage();
                renderList();
                showToast('ล้างข้อมูลเรียบร้อย', 'info');
            }
        }

        // --- Data & UI Update ---
        function renderList() {
            listUl.innerHTML = '';
            totalBadge.innerText = `${scannedData.length} รายการ`;

            if (scannedData.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            scannedData.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-white border border-gray-100 p-3 rounded-lg shadow-sm";
                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-blue-700 text-lg">${item.barcode}</span>
                        <span class="text-xs text-gray-400"><i class="fa-regular fa-clock"></i> ${item.time}</span>
                    </div>
                    <button onclick="deleteItem(${item.timestamp})" class="text-red-400 bg-red-50 p-2 rounded-full active:bg-red-100">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;
                // ใช้ prepend เพื่อให้รายการใหม่สุดดันขึ้นไปอยู่บนสุด
                listUl.prepend(li);
            });
        }

        function saveToLocalStorage() {
            localStorage.setItem('mobile_qc_scans', JSON.stringify(scannedData));
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('mobile_qc_scans');
                if (saved) {
                    scannedData = JSON.parse(saved);
                    renderList();
                }
            } catch (e) {
                console.error("Load error:", e);
            }
        }

        // --- Export Functions ---
        function copyToClipboard() {
            if (scannedData.length === 0) {
                showToast('ไม่มีข้อมูลให้คัดลอก', 'error');
                return;
            }

            let textToCopy = "บาร์โค้ด\tเวลา\n";
            // เรียงจากเก่าไปใหม่สำหรับ Export
            scannedData.forEach(item => {
                textToCopy += `${item.barcode}\t${item.time}\n`;
            });

            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast('คัดลอกสำเร็จ!', 'success');
        }

        function exportToCSV() {
            if (scannedData.length === 0) {
                showToast('ไม่มีข้อมูลให้ Export', 'error');
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFFบาร์โค้ด,เวลา\n";
            scannedData.forEach(item => {
                csvContent += `"${item.barcode}","${item.time}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            const dateStr = new Date().toISOString().split('T')[0];
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `QC_Scan_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('ดาวน์โหลด CSV สำเร็จ!', 'success');
        }

        // --- Utils ---
        function playSound(type) {
            try {
                if (type === 'success') {
                    soundSuccess.currentTime = 0;
                    soundSuccess.play().catch(e=>console.log(e));
                } else {
                    soundError.currentTime = 0;
                    soundError.play().catch(e=>console.log(e));
                }
            } catch (error) {}
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastText = document.getElementById('toast-text');

            toastText.innerText = message;
            
            if (type === 'success') {
                toast.className = "toast fixed top-16 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full font-bold shadow-lg flex items-center gap-2 bg-green-500 text-white";
                toastIcon.className = "fa-solid fa-circle-check";
            } else if (type === 'error') {
                toast.className = "toast fixed top-16 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full font-bold shadow-lg flex items-center gap-2 bg-red-500 text-white";
                toastIcon.className = "fa-solid fa-circle-xmark";
            } else {
                toast.className = "toast fixed top-16 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full font-bold shadow-lg flex items-center gap-2 bg-gray-800 text-white";
                toastIcon.className = "fa-solid fa-circle-info";
            }

            toast.classList.remove('hidden-toast');

            // ซ่อนอัตโนมัติ
            setTimeout(() => {
                toast.classList.add('hidden-toast');
            }, 2500);
        }
    </script>
</body>
</html>
