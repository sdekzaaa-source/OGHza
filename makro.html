<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makro Payer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel สำหรับรัน JSX ในเบราว์เซอร์ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- html2canvas สำหรับเซฟบิลเป็นรูปภาพ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Animations */
        @keyframes bounce-short { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .animate-bounce-short { animation: bounce-short 2s ease-in-out infinite; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.2s ease-out; }
        @keyframes fade-in-scale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in-scale { animation: fade-in-scale 0.2s ease-out; }
        
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ป้องกันไม่ให้ Slip ดั้งเดิมขยับตอนที่ Html2canvas เรนเดอร์ */
        .offscreen-slip { position: fixed; top: -9999px; left: -9999px; z-index: -1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- ไอคอนแบบ Inline SVG ---
        const IconBase = ({ children, className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const ShoppingCart = ({className}) => <IconBase className={className}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></IconBase>;
        const Users = ({className}) => <IconBase className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Calculator = ({className}) => <IconBase className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const Plus = ({className}) => <IconBase className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>;
        const Trash2 = ({className}) => <IconBase className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
        const CalendarIcon = ({className}) => <IconBase className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconBase>;
        const CheckCircle2 = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconBase>;
        const RefreshCw = ({className}) => <IconBase className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;
        const Save = ({className}) => <IconBase className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconBase>;
        const CloudOff = ({className}) => <IconBase className={className}><path d="m2 2 20 20"/><path d="M5.78 5.78a9 9 0 0 0 11.45 11.44"/><path d="M21.53 16.22A7 7 0 0 0 17.5 4h-1.3A9 9 0 0 0 7.78 4.56"/></IconBase>;
        const CloudLightning = ({className}) => <IconBase className={className}><path d="M6 16.326A7 7 0 1 1 15.71 5h1.79a4.5 4.5 0 0 1 .5 8.973"/><path d="m13 11-4 6h6l-4 6"/></IconBase>;
        const UploadCloud = ({className}) => <IconBase className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></IconBase>;
        const Search = ({className}) => <IconBase className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
        const LineChart = ({className}) => <IconBase className={className}><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></IconBase>;
        const Receipt = ({className}) => <IconBase className={className}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6"/><path d="M16 12h-8"/><path d="M16 16h-8"/></IconBase>;
        const ChevronDown = ({className}) => <IconBase className={className}><path d="m6 9 6 6 6-6"/></IconBase>;
        const ChevronUp = ({className}) => <IconBase className={className}><path d="m18 15-6-6-6 6"/></IconBase>;
        const ChevronLeft = ({className}) => <IconBase className={className}><path d="m15 18-6-6 6-6"/></IconBase>;
        const ChevronRight = ({className}) => <IconBase className={className}><path d="m9 18 6-6-6-6"/></IconBase>;
        const Tag = ({className}) => <IconBase className={className}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></IconBase>;
        const Edit2 = ({className}) => <IconBase className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;
        const Camera = ({className}) => <IconBase className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconBase>;
        const X = ({className}) => <IconBase className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;
        const Download = ({className}) => <IconBase className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;

        // --- คอมโพเนนต์ปฏิทินแบบ Custom ---
        function CustomCalendar({ selectedDate, onChange, markedDates, onClose }) {
            const [currentMonth, setCurrentMonth] = useState(() => {
                const [y, m, d] = selectedDate.split('-');
                return new Date(y, parseInt(m) - 1, 1);
            });

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1).getDay();
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

            const prevMonth = () => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1));
            const nextMonth = () => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1));

            const renderDays = () => {
                const days = [];
                const today = new Date();
                const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

                for (let i = 0; i < firstDayOfMonth; i++) days.push(<div key={`empty-${i}`} className="w-10 h-10"></div>);
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const dStr = `${currentMonth.getFullYear()}-${String(currentMonth.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    const isSelected = dStr === selectedDate;
                    const hasMark = markedDates.has(dStr);
                    const isToday = dStr === todayStr;

                    days.push(
                        <div key={i} className="flex justify-center items-center relative w-10 h-10">
                            <button 
                                onClick={() => { onChange(dStr); onClose(); }}
                                className={`w-8 h-8 rounded-full flex items-center justify-center text-sm transition-colors ${
                                    isSelected ? 'bg-red-600 text-white font-bold shadow-md' : isToday ? 'bg-red-50 text-red-600 font-bold' : 'text-gray-700 hover:bg-gray-100'
                                }`}
                            >{i}</button>
                            {hasMark && !isSelected && <span className="absolute bottom-0 w-1.5 h-1.5 bg-red-400 rounded-full"></span>}
                            {hasMark && isSelected && <span className="absolute bottom-0 w-1.5 h-1.5 bg-white rounded-full shadow-sm"></span>}
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="bg-white p-5 rounded-2xl shadow-xl border border-gray-100 w-full max-w-[320px] mx-auto animate-fade-in-scale">
                    <div className="flex justify-between items-center mb-4">
                        <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600"><ChevronLeft className="w-5 h-5" /></button>
                        <div className="font-bold text-lg text-gray-800">{monthNames[currentMonth.getMonth()]} {currentMonth.getFullYear() + 543}</div>
                        <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600"><ChevronRight className="w-5 h-5" /></button>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center mb-3">
                        {['อา','จ','อ','พ','พฤ','ศ','ส'].map(d => <div key={d} className="text-xs font-semibold text-gray-400">{d}</div>)}
                    </div>
                    <div className="grid grid-cols-7 gap-1 place-items-center">{renderDays()}</div>
                    <div className="mt-4 pt-3 border-t border-gray-100 flex justify-center gap-4 text-xs text-gray-500">
                        <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-400"></span> มีบันทึก</div>
                        <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-600"></span> วันที่เลือก</div>
                    </div>
                </div>
            );
        }

        // --- App Component ---
        function App() {
            const [activeTab, setActiveTab] = useState('record');
            
            const [scriptUrl, setScriptUrl] = useState(() => localStorage.getItem('macroAppScriptUrl') || 'https://script.google.com/macros/s/AKfycbwYBVs2aH2fG7e9SF2B9WUsewepen0ZbL1yhUDooWfit_QzjBk5DuOptC57trucv3Ly/exec');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncMessage, setSyncMessage] = useState('');

            useEffect(() => { localStorage.setItem('macroAppScriptUrl', scriptUrl); }, [scriptUrl]);

            const [itemCatalog, setItemCatalog] = useState(() => JSON.parse(localStorage.getItem('makroItemCatalog')) || {});
            useEffect(() => { localStorage.setItem('makroItemCatalog', JSON.stringify(itemCatalog)); }, [itemCatalog]);

            const [users, setUsers] = useState([
                { id: '1', name: 'คนแรก', isRegular: true },
                { id: '2', name: 'คนที่สอง', isRegular: true },
                { id: '3', name: 'คนที่สาม', isRegular: true },
                { id: '4', name: 'พี', isRegular: false } 
            ]);

            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('makroTransactions')) || []);
            useEffect(() => { localStorage.setItem('makroTransactions', JSON.stringify(transactions)); }, [transactions]);
            
            const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
            const [showCalendar, setShowCalendar] = useState(false); 
            
            const [itemName, setItemName] = useState('');
            const [quantity, setQuantity] = useState('1'); 
            const [unitPrice, setUnitPrice] = useState(''); 
            const [payer, setPayer] = useState('all');
            const [category, setCategory] = useState('อาหาร/ของสด'); 

            const [newUserName, setNewUserName] = useState('');
            const [isNewUserRegular, setIsNewUserRegular] = useState(true);

            const [customPayers, setCustomPayers] = useState([]);
            const [txToDelete, setTxToDelete] = useState(null);
            const [editingTx, setEditingTx] = useState(null); 

            const [searchQuery, setSearchQuery] = useState('');
            const [historyData, setHistoryData] = useState([]);
            const [expandedUsers, setExpandedUsers] = useState({});
            const [summaryView, setSummaryView] = useState('daily'); 

            // ตัวแปรสำหรับระบบ Slip
            const [slipData, setSlipData] = useState(null); // ข้อมูลคนที่จะทำสลิป
            const [slipImageSrc, setSlipImageSrc] = useState(null); // รูปสลิปที่ได้มา
            const [isGeneratingSlip, setIsGeneratingSlip] = useState(false);
            const slipRef = useRef(null);

            const categoriesList = ['อาหาร/ของสด', 'ของใช้ในบ้าน', 'เครื่องดื่ม/ขนม', 'อื่นๆ'];

            const markedDates = useMemo(() => {
                const marks = new Set();
                transactions.forEach(t => { if (t.status !== 'deleted') marks.add(t.date); });
                return marks;
            }, [transactions]);

            const calculatedTotal = useMemo(() => {
                const q = parseFloat(quantity) || 0;
                const p = parseFloat(unitPrice) || 0;
                const rawTotal = q * p;
                return Math.round(rawTotal * 4) / 4;
            }, [quantity, unitPrice]);

            const fetchAllDataFromSheet = async () => {
                if (!scriptUrl) return;
                setIsSyncing(true);
                setSyncMessage('กำลังซิงค์ข้อมูล...');
                try {
                    const resUsers = await fetch(`${scriptUrl}?action=getUsers`);
                    const dataUsers = await resUsers.json();
                    if (dataUsers.status === 'success' && dataUsers.users) setUsers(dataUsers.users);

                    const resHistory = await fetch(`${scriptUrl}?action=getHistory`);
                    const dataHistory = await resHistory.json();
                    if (dataHistory.status === 'success' && dataHistory.data) {
                        const sheetTxs = dataHistory.data.map((row, idx) => {
                            const d = new Date(row.date);
                            const localDate = isNaN(d.getTime()) ? row.date : `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                            return {
                                id: `sheet-${idx}`, date: localDate, name: row.name,
                                quantity: parseFloat(row.quantity) || 1, unitPrice: parseFloat(row.unitPrice) || 0, price: parseFloat(row.price) || 0,
                                payerName: row.payerName ? String(row.payerName) : '', payerId: row.payerId ? String(row.payerId) : 'all',
                                category: row.category || 'อื่นๆ', status: 'saved'
                            };
                        });
                        
                        const pendingTxs = transactions.filter(t => t.status === 'pending');
                        setTransactions([...sheetTxs, ...pendingTxs]);

                        const newCatalog = { ...itemCatalog };
                        sheetTxs.forEach(tx => {
                            if (!newCatalog[tx.name] || new Date(tx.date) >= new Date(newCatalog[tx.name].lastDate || '2000-01-01')) {
                                newCatalog[tx.name] = { lastPrice: tx.unitPrice, lastDate: tx.date };
                            }
                        });
                        setItemCatalog(newCatalog);
                    }
                    setSyncMessage('อัปเดตข้อมูลสำเร็จ!');
                    setTimeout(() => setSyncMessage(''), 3000);
                } catch (error) {
                    console.error("Sync error:", error);
                    setSyncMessage('❌ ซิงค์ข้อมูลล้มเหลว');
                } finally {
                    setIsSyncing(false);
                }
            };

            useEffect(() => { if (scriptUrl) fetchAllDataFromSheet(); }, []);

            const dailySummary = useMemo(() => {
                const summary = {};
                users.forEach(u => summary[u.id] = { name: u.name, total: 0, items: [] });

                const todayTransactions = transactions.filter(t => t.date === currentDate && t.status !== 'deleted');
                const regularUsers = users.filter(u => u.isRegular);
                const regularUserCount = regularUsers.length;

                todayTransactions.forEach(t => {
                    const pId = String(t.payerId || 'all'); 
                    if (pId === 'all') {
                        if (regularUserCount > 0) {
                            const splitAmount = t.price / regularUserCount;
                            regularUsers.forEach(ru => {
                                if (summary[ru.id]) {
                                    summary[ru.id].total += splitAmount;
                                    summary[ru.id].items.push({ name: t.name, amount: splitAmount });
                                }
                            });
                        }
                    } else if (pId.includes(',')) {
                        const customIds = pId.split(',');
                        const validIds = customIds.filter(id => summary[id]);
                        if (validIds.length > 0) {
                            const splitAmount = t.price / validIds.length;
                            validIds.forEach(id => {
                                summary[id].total += splitAmount;
                                summary[id].items.push({ name: t.name, amount: splitAmount });
                            });
                        }
                    } else {
                        if (summary[pId]) {
                            summary[pId].total += t.price;
                            summary[pId].items.push({ name: t.name, amount: t.price });
                        }
                    }
                });
                return summary;
            }, [transactions, users, currentDate]);

            const allTimeSummary = useMemo(() => {
                const summary = {};
                users.forEach(u => summary[u.id] = { name: u.name, total: 0 });

                const validTransactions = transactions.filter(t => t.status !== 'deleted');
                const regularUsers = users.filter(u => u.isRegular);
                const regularUserCount = regularUsers.length;

                validTransactions.forEach(t => {
                    const pId = String(t.payerId || 'all'); 
                    if (pId === 'all') {
                        if (regularUserCount > 0) {
                            const splitAmount = t.price / regularUserCount;
                            regularUsers.forEach(ru => {
                                if (summary[ru.id]) summary[ru.id].total += splitAmount;
                            });
                        }
                    } else if (pId.includes(',')) {
                        const customIds = pId.split(',');
                        const validIds = customIds.filter(id => summary[id]);
                        if (validIds.length > 0) {
                            const splitAmount = t.price / validIds.length;
                            validIds.forEach(id => {
                                if (summary[id]) summary[id].total += splitAmount;
                            });
                        }
                    } else {
                        if (summary[pId]) summary[pId].total += t.price;
                    }
                });
                return summary;
            }, [transactions, users]);

            const getPayerName = (id, customArr = []) => {
                if (!id) return 'ไม่ทราบ';
                const strId = String(id);
                if (strId === 'all') return 'หารทุกคน (ยกเว้น พี)';
                if (strId === 'custom') {
                    const names = users.filter(u => customArr.includes(String(u.id))).map(u => u.name);
                    return `หาร: ${names.join(', ')}`;
                }
                if (strId.includes(',')) {
                    const ids = strId.split(',');
                    const names = users.filter(u => ids.includes(String(u.id))).map(u => u.name);
                    return `หาร: ${names.join(', ')}`;
                }
                const user = users.find(u => String(u.id) === strId);
                return user ? user.name : 'ไม่ทราบ';
            };

            const handleItemNameChange = (e) => {
                const val = e.target.value;
                setItemName(val);
                if (itemCatalog[val]) setUnitPrice(itemCatalog[val].lastPrice.toString());
            };

            const handleAddTransactionLocal = (e) => {
                e.preventDefault();
                if (!itemName || !unitPrice || isNaN(unitPrice) || !quantity || isNaN(quantity)) return;

                if (payer === 'custom' && customPayers.length === 0) {
                    alert('กรุณาเลือกผู้ที่ต้องหารอย่างน้อย 1 คน'); return;
                }

                let finalPayerId = payer;
                let finalPayerName = getPayerName(payer, customPayers);

                if (payer === 'custom') finalPayerId = customPayers.join(',');

                const newTx = {
                    id: Date.now().toString(), date: currentDate, name: itemName.trim(),
                    quantity: parseFloat(quantity), unitPrice: parseFloat(unitPrice), price: calculatedTotal, 
                    payerId: String(finalPayerId), payerName: String(finalPayerName), category: category, status: 'pending'
                };

                setTransactions([...transactions, newTx]);
                setItemCatalog(prev => ({ ...prev, [newTx.name]: { lastPrice: newTx.unitPrice, lastDate: newTx.date } }));
                
                setItemName(''); setQuantity('1'); setUnitPrice('');
                setPayer('all'); setCategory('อาหาร/ของสด'); setCustomPayers([]);
            };

            const handleSaveAllToSheet = async () => {
                const pendingTxs = transactions.filter(t => t.status === 'pending');
                if (pendingTxs.length === 0 || !scriptUrl) return;

                setIsSyncing(true); setSyncMessage(`กำลังบันทึก ${pendingTxs.length} รายการ...`);

                try {
                    await fetch(scriptUrl, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'addMultipleTransactions', data: pendingTxs })
                    });
                    setTransactions(transactions.map(t => t.status === 'pending' ? { ...t, status: 'saved' } : t));
                    setSyncMessage('บันทึกลง Sheet สำเร็จ'); setTimeout(() => setSyncMessage(''), 3000);
                } catch (error) {
                    console.error("Save failed", error); setSyncMessage('❌ บันทึกลง Sheet ล้มเหลว');
                } finally { setIsSyncing(false); }
            };

            const handleDeleteTransaction = (id) => setTransactions(transactions.filter(t => t.id !== id));
            const confirmDeleteSavedTransaction = (tx) => setTxToDelete(tx);

            const executeDelete = async () => {
                const txToDeleteRef = txToDelete;
                setTxToDelete(null); 
                setTransactions(transactions.filter(t => t.id !== txToDeleteRef.id));

                if (!scriptUrl) return;
                setIsSyncing(true); setSyncMessage('กำลังลบรายการ...');

                try {
                    await fetch(scriptUrl, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'deleteTransaction', data: txToDeleteRef })

                    console.error("Delete failed", error); setSyncMessage('❌ ลบล้มเหลว โปรดซิงค์ใหม่');
                } finally { setIsSyncing(false); }
            };

                e.preventDefault();
                if (!editingTx) return;

                let finalPayerId = editingTx.payerId;
                let finalPayerName = editingTx.payerName;
                
                if (finalPayerId === 'custom') {
                    if (customPayers.length === 0) { alert('กรุณาเลือกผู้ที่ต้องหารอย่างน้อย 1 คน'); return; }
                    finalPayerId = customPayers.join(',');
                    finalPayerName = getPayerName('custom', customPayers);
                } else {
                    finalPayerName = getPayerName(finalPayerId);
                }

                const updatedTx = {
                    ...editingTx,
                    price: Math.round((parseFloat(editingTx.quantity) * parseFloat(editingTx.unitPrice)) * 4) / 4,
                    payerId: finalPayerId, payerName: finalPayerName
                };

                const oldTx = transactions.find(t => t.id === updatedTx.id);

                setTransactions(transactions.map(t => t.id === updatedTx.id ? updatedTx : t));
                setEditingTx(null); setCustomPayers([]);

                if (!scriptUrl || oldTx.status === 'pending') return; 

                setIsSyncing(true); setSyncMessage('กำลังบันทึกการแก้ไข...');

                try {
                    await fetch(scriptUrl, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'editTransaction', oldData: oldTx, newData: updatedTx })
                    });
                    setSyncMessage('แก้ไขข้อมูลสำเร็จ'); setTimeout(() => setSyncMessage(''), 3000);
                } catch (error) {
                    console.error("Edit failed", error); setSyncMessage('❌ แก้ไขล้มเหลว โปรดซิงค์ใหม่');
                } finally { setIsSyncing(false); }

                    if (slipRef.current) {

                            const canvas = await html2canvas(slipRef.current, {

                                backgroundColor: '#ffffff',

                            });

                            alert("ไม่สามารถสร้างรูปสลิปได้ โปรดลองอีกครั้ง");

                                                            className={`flex flex-1 items-center gap-3 text-left focus:outline-none ${userSummary.items.length > 0 ? 'cursor-pointer' : 'cursor-default'}`}
                                                        >
                                                            <div className="bg-red-50 p-2 rounded-full"><Calculator className="text-red-600 w-5 h-5" /></div>
                                                            <div>
                                                                <span className="font-medium text-lg text-gray-800">{userSummary.name}</span>
                                                                <p className="text-sm font-bold text-red-600">฿{userSummary.total.toFixed(2)}</p>
                                                            </div>
                                                        </button>
                                                        
                                                        <div className="flex items-center gap-1 pl-2">
                                                            {/* ปุ่มสร้างรูปสลิปของแต่ละบุคคล */}
                                                            {userSummary.items.length > 0 && (
                                                                <button 
                                                                    onClick={(e) => { e.stopPropagation(); handleGenerateSlip(userSummary); }}
                                                                    className="p-2 text-gray-400 hover:text-blue-500 hover:bg-blue-50 rounded-full transition-colors"
                                                                    title="สร้างรูปสลิปสรุปยอด"
                                                                >
                                                                    {isGeneratingSlip && slipData?.name === userSummary.name ? <RefreshCw className="w-5 h-5 animate-spin" /> : <Camera className="w-5 h-5" />}
                                                                </button>
                                                            )}
                                                            
                                                            <button onClick={() => { if (userSummary.items.length > 0) setExpandedUsers(prev => ({ ...prev, [userSummary.name]: !prev[userSummary.name] })); }} className="p-2 text-gray-400 hover:bg-gray-50 rounded-full transition-colors">
                                                                {userSummary.items.length > 0 && (expandedUsers[userSummary.name] ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />)}
                                                            </button>
                                                        </div>
                                                    </div>
                                                    
                                                    {userSummary.items.length > 0 && expandedUsers[userSummary.name] && (
                                                        <div className="px-4 pb-4 bg-gray-50/50 animate-fade-in">
                                                            <div className="pt-3 border-t border-gray-100">
                                                                <ul className="space-y-2">
                                                                    {userSummary.items.map((item, idx) => (
                                                                        <li key={idx} className="flex justify-between text-sm text-gray-600">
                                                                            <span className="truncate pr-2">- {item.name}</span>
                                                                            <span className="whitespace-nowrap font-medium text-gray-800">฿{item.amount.toFixed(2)}</span>
                                                                        </li>
                                                                    ))}
                                                                </ul>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                            
                                            <div className="mt-2 flex justify-between items-center bg-gray-800 text-white p-5 rounded-xl shadow-md">
                                                <span className="font-medium">ยอดรวมบิลวันนี้</span>
                                                <span className="font-bold text-2xl">
                                                    ฿{transactions.filter(t => t.date === currentDate && t.status !== 'deleted').reduce((sum, t) => sum + t.price, 0).toFixed(2)}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                                        <div className="grid gap-4 animate-fade-in">
                                            {Object.values(allTimeSummary).map(userSummary => (
                                                <div key={userSummary.name} className="flex flex-col bg-gray-50 rounded-lg border border-gray-200 p-4">
                                                    <div className="flex justify-between items-center">
                                                        <div className="flex items-center gap-3">
                                                            <div className="bg-white p-2 rounded-full shadow-sm"><Users className="text-gray-600 w-5 h-5" /></div>
                                                            <span className="font-medium text-lg text-gray-800">{userSummary.name}</span>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="text-sm text-gray-500">ยอดสะสมสุทธิ</p>
                                                            <p className="font-bold text-xl text-gray-800">฿{userSummary.total.toFixed(2)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            <div className="mt-4 pt-4 border-t border-gray-200 flex justify-between items-center">
                                                <span className="font-bold text-gray-800">ยอดรวมสะสมทั้งหมด</span>
                                                <span className="font-bold text-xl text-red-600">
                                                    ฿{transactions.filter(t => t.status !== 'deleted').reduce((sum, t) => sum + t.price, 0).toFixed(2)}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-6 animate-fade-in">
                                <div>
                                    <h2 className="text-lg font-semibold mb-2 text-blue-800 flex items-center gap-2"><Save className="w-5 h-5"/> เชื่อมต่อ Google Sheets</h2>
                                    <div className="flex flex-col gap-2">
                                        <input type="text" value={scriptUrl} onChange={(e) => setScriptUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..." className="w-full p-2 text-sm border border-blue-200 rounded-lg outline-none bg-blue-50" />
                                        <button onClick={fetchAllDataFromSheet} disabled={!scriptUrl || isSyncing} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition disabled:bg-blue-300 flex items-center justify-center gap-2">
                                            <RefreshCw className={`w-4 h-4 ${isSyncing ? 'animate-spin' : ''}`} /> ซิงค์ข้อมูลทั้งหมด
                                        </button>
                                    </div>
                                </div>

                                <hr />

                                <div>
                                    <h2 className="text-lg font-semibold mb-2 text-gray-800">รายชื่อผู้ซื้อในแอป</h2>
                                    <p className="text-xs text-gray-500 mb-4 pb-2 border-b">{scriptUrl ? 'ดึงข้อมูลมาจากแถบ gid=424292860 (อัปเดตจาก Sheet ได้เลย)' : 'ตั้งค่าจำลองในแอป (เนื่องจากไม่ได้ต่อ Sheet)'}</p>
                                    
                                    {!scriptUrl && (
                                        <form onSubmit={handleAddUser} className="flex gap-2 mb-4">
                                            <input type="text" value={newUserName} onChange={(e) => setNewUserName(e.target.value)} placeholder="เพิ่มชื่อใหม่..." className="flex-1 p-2 text-sm border border-gray-300 rounded-lg outline-none" />
                                            <button type="submit" className="bg-gray-800 text-white px-3 py-1 rounded-lg text-sm">เพิ่ม</button>
                                        </form>
                                    )}

                                    <div className="space-y-2">
                                        {users.map(u => (
                                            <div key={u.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-200">
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => !scriptUrl && toggleUserRegular(u.id)} className={`p-1 rounded-full transition ${u.isRegular ? 'text-green-500' : 'text-gray-300'}`}>
                                                        <CheckCircle2 className="w-6 h-6" />
                                                    </button>
                                                    <div>
                                                        <p className="font-medium text-gray-800">{u.name}</p>
                                                        <p className="text-xs text-gray-500">{u.isRegular ? 'ถูกนำมาหารในหมวด "All"' : 'ได้รับการยกเว้นในหมวด "All"'}</p>
                                                    </div>
                                                </div>
                                                {!scriptUrl && <button onClick={() => handleDeleteUser(u.id)} className="text-red-400 hover:text-red-600 p-2"><Trash2 className="w-5 h-5" /></button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* ซ่อน Template สลิปไว้เพื่อใช้ Html2canvas จับภาพ (จะแสดงผลตอนเรียกฟังก์ชันสร้างสลิป) */}
                    {slipData && (
                        <div className="offscreen-slip">
                            <div ref={slipRef} className="bg-white p-6 w-[360px] font-sans text-gray-800 shadow-lg relative overflow-hidden" style={{ border: '1px solid #e5e7eb' }}>
                                {/* พื้นหลังลายน้ำ / ตกแต่งใบเสร็จ */}
                                <div className="absolute top-0 left-0 w-full h-2 bg-red-600"></div>
                                
                                <div className="text-center border-b border-dashed border-gray-300 pb-4 mb-4 mt-2">
                                    <h2 className="text-2xl font-bold text-gray-900 tracking-wider">MAKRO PAYER</h2>
                                    <p className="text-sm text-gray-500 mt-1">สรุปยอดที่ต้องชำระ (บิลแชร์)</p>
                                    <p className="text-sm font-medium text-gray-700">{new Date(currentDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                                
                                <div className="mb-5 flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                                    <span className="text-gray-500 text-sm">ผู้รับผิดชอบ:</span>
                                    <span className="text-lg font-bold text-red-600">{slipData.name}</span>
                                </div>

                                <div className="space-y-2.5 mb-6">
                                    <div className="flex justify-between text-xs font-bold text-gray-400 border-b pb-2 mb-2">
                                        <span>รายการสินค้า</span>
                                        <span>จำนวนเงิน (บาท)</span>
                                    </div>
                                    {slipData.items.map((item, idx) => (
                                        <div key={idx} className="flex justify-between text-sm">
                                            <span className="truncate pr-4 text-gray-700">- {item.name}</span>
                                            <span className="whitespace-nowrap font-medium text-gray-900">{item.amount.toFixed(2)}</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="border-t border-dashed border-gray-300 pt-4 flex justify-between items-end">
                                    <span className="text-gray-600 font-bold">ยอดรวมสุทธิ</span>
                                    <span className="text-2xl font-bold text-red-600">฿{slipData.total.toFixed(2)}</span>
                                </div>
                                
                                <div className="mt-8 text-center text-xs text-gray-400">
                                    <p>สร้างอัตโนมัติโดยแอป Makro Payer</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal สำหรับแสดงรูปภาพสลิปที่สร้างเสร็จแล้ว */}
                    {slipImageSrc && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 animate-fade-in backdrop-blur-sm">
                            <div className="relative max-w-sm w-full">
                                <button 
                                    onClick={() => setSlipImageSrc(null)}
                                    className="absolute -top-12 right-0 text-white hover:text-gray-300 p-2"
                                >
                                    <X className="w-8 h-8" />
                                </button>
                                
                                <div className="bg-white p-2 rounded-xl shadow-2xl animate-fade-in-scale">
                                    <img src={slipImageSrc} alt="Slip" className="w-full rounded-lg" />
                                </div>
                                
                                <div className="text-center mt-4 text-white">
                                    <p className="font-medium flex items-center justify-center gap-2">
                                        <Download className="w-5 h-5"/> กดค้างที่รูปภาพเพื่อบันทึก
                                    </p>
                                    <p className="text-xs text-gray-400 mt-1">(หรือแคปหน้าจอนี้เพื่อส่งต่อ)</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Popup ยืนยันการลบ */}
                    {txToDelete && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-fade-in backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm animate-fade-in-scale">
                                <h3 className="text-lg font-bold text-gray-900 mb-2">ยืนยันการลบรายการ</h3>
                                <p className="text-sm text-gray-600 mb-6">
                                    คุณต้องการลบ <strong>"{txToDelete.name}"</strong> (฿{txToDelete.price.toFixed(2)}) ออกจากระบบใช่หรือไม่?<br/>
                                    <span className="text-xs text-red-500 mt-1 block">*ข้อมูลนี้จะถูกลบออกจาก Google Sheet ถาวร</span>
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => setTxToDelete(null)} className="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition">ยกเลิก</button>
                                    <button onClick={executeDelete} className="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition">ยืนยันลบ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Popup แก้ไขรายการ */}
                    {editingTx && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-fade-in backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-xl p-5 w-full max-w-md animate-fade-in-scale max-h-[90vh] overflow-y-auto">
                                <h3 className="text-lg font-bold text-gray-900 mb-4 border-b pb-2 flex items-center gap-2"><Edit2 className="w-5 h-5"/> แก้ไขรายการบิล</h3>
                                <form onSubmit={executeEdit} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อสินค้า</label>
                                        <input type="text" value={editingTx.name} onChange={(e) => setEditingTx({...editingTx, name: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">จำนวน</label>
                                            <input type="number" value={editingTx.quantity} onChange={(e) => setEditingTx({...editingTx, quantity: e.target.value})} min="0.001" step="0.001" className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">ราคา/หน่วย</label>
                                            <input type="number" value={editingTx.unitPrice} onChange={(e) => setEditingTx({...editingTx, unitPrice: e.target.value})} min="0" step="0.01" className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required />
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่</label>
                                            <select value={editingTx.category || 'อื่นๆ'} onChange={(e) => setEditingTx({...editingTx, category: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                                {categoriesList.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">ผู้รับผิดชอบ</label>
                                            <select 
                                                value={editingTx.payerId.includes(',') ? 'custom' : editingTx.payerId}
                                                onChange={(e) => {
                                                    const val = e.target.value;
                                                    if (val === 'custom' && customPayers.length === 0) setCustomPayers(users.filter(u => u.isRegular).map(u => String(u.id)));
                                                    setEditingTx({...editingTx, payerId: val});
                                                }}
                                                className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                            >
                                                <option value="all">หารเท่า</option>
                                                <option value="custom">ระบุเอง...</option>
                                                {users.map(u => <option key={u.id} value={u.id}>เฉพาะ: {u.name}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    {(editingTx.payerId === 'custom' || editingTx.payerId.includes(',')) && (
                                        <div className="p-3 bg-blue-50 border border-blue-100 rounded-lg">
                                            <label className="block text-sm font-medium text-gray-700 mb-2">เลือกคนที่ต้องการนำมาหาร:</label>
                                            <div className="flex flex-wrap gap-2">
                                                {users.map(u => (
                                                    <label key={u.id} className="flex items-center gap-2 cursor-pointer bg-white px-3 py-1.5 rounded-md border border-gray-200 shadow-sm hover:bg-gray-50 transition">
                                                        <input 
                                                            type="checkbox" checked={customPayers.includes(String(u.id))}
                                                            onChange={(e) => {
                                                                const strId = String(u.id);
                                                                if (e.target.checked) setCustomPayers([...customPayers, strId]);
                                                                else setCustomPayers(customPayers.filter(id => id !== strId));
                                                            }}
                                                            className="w-4 h-4 text-blue-600 rounded border-gray-300"
                                                        />
                                                        <span className="text-sm text-gray-800">{u.name}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex gap-3 pt-2 border-t mt-4">
                                        <button type="button" onClick={() => setEditingTx(null)} className="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition">ยกเลิก</button>
                                        <button type="submit" className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition">บันทึกแก้ไข</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
                        <div className="max-w-2xl mx-auto flex justify-around">
                            <button onClick={() => setActiveTab('record')} className={`flex-1 flex flex-col items-center py-3 gap-1 transition ${activeTab === 'record' ? 'text-red-600' : 'text-gray-400'}`}>
                                <ShoppingCart className="w-6 h-6" /><span className="text-[10px] font-medium">จดรายการ</span>
                            </button>
                            <button onClick={() => setActiveTab('bills')} className={`flex-1 flex flex-col items-center py-3 gap-1 transition ${activeTab === 'bills' ? 'text-red-600' : 'text-gray-400'}`}>
                                <Receipt className="w-6 h-6" /><span className="text-[10px] font-medium">ประวัติบิล</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 flex flex-col items-center py-3 gap-1 transition ${activeTab === 'history' ? 'text-red-600' : 'text-gray-400'}`}>
                                <LineChart className="w-6 h-6" /><span className="text-[10px] font-medium">กราฟราคา</span>
                            </button>
                            <button onClick={() => setActiveTab('summary')} className={`flex-1 flex flex-col items-center py-3 gap-1 transition ${activeTab === 'summary' ? 'text-red-600' : 'text-gray-400'}`}>
                                <Calculator className="w-6 h-6" /><span className="text-[10px] font-medium">สรุปยอด</span>
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex-1 flex flex-col items-center py-3 gap-1 transition ${activeTab === 'settings' ? 'text-red-600' : 'text-gray-400'}`}>
                                <Users className="w-6 h-6" /><span className="text-[10px] font-medium">ตั้งค่า</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
